[check]
# Fypp include dirs — common.fypp provides sensible defaults for all
# WITH_* variables via defined(), so no -D flags are needed.
fypp-includes = ["src/dftbp/include"]

# Read CMake build configuration to automatically derive -D flags for fypp.
# Enabled boolean options (e.g. WITH_OMP:BOOL=ON) become -DWITH_OMP.
fypp-cmake-cache = "build"

# Metadata variables that don't have defaults in common.fypp.
# These are only used by #:assert and string literals, not code structure.
fypp-args = [
    "-DRELEASE='dev'",
    "-DAPIVERSION='0.0.0'",
    "-DAPIMAJOR=0",
    "-DAPIMINOR=0",
    "-DAPIPATCH=0",
    "-DELSI_VERSION=0",
]

# Exclude: test/ (needs fortuno external), external/ (third-party code),
# extlibs/ (thin wrappers around external libraries — minimal code, many stubs),
# utils/workarounds/ (intentionally non-standard compiler test programs),
# app/misc/cmake/ (CMake feature-detection programs),
# poisson/ (third-party code from Univ. Rome 'Tor Vergata')
extend-exclude = [
    "test/", "external/", "src/dftbp/extlibs/",
    "utils/workarounds/", "app/misc/cmake/",
    "src/dftbp/poisson/",
]

select = ["ALL"]
ignore = [
    # --- Internal test rules (not for real projects) ---
    "FORT",    # all Fortitude internal test rules (FORT99xx)

    # --- Formatting / style (not autofixable, too many) ---
    "S001",    # line-too-long — 1669 violations, manual reformatting needed

    # --- Coding conventions (too many violations to enforce yet) ---
    "C003",    # implicit-external-procedures — 290 violations, widespread in fypp macros
    "C002",    # interface-implicit-typing — 32 violations, tied to C003 patterns
    "C061",    # missing-intent — 388 violations, would need gradual enforcement

    # --- Scientific / domain idioms (false positives for scientific code) ---
    "C031",    # magic-number-in-array-size — 32 violations, 3 = spatial dims etc.
]

# C021 (no-real-suffix): dftbplus uses `dp` (= real64) from accuracy module.
[check.kind-suffixes]
real-suffix = "dp"

# Rules enforced globally but grandfathered in specific files.
# New code must comply; existing violations are tracked here.
[check.per-file-ignores]
# C071 assumed-size-array (28 violations across 2 files)
"src/dftbp/api/mm/capi.F90" = ["C071"]
"src/dftbp/api/mm/qdepextpotgenc.F90" = ["C071"]
# C072 assumed-size-character (9 violations across 7 files)
"app/misc/slakovalue/integvalue.F90" = ["C072"]
"src/dftbp/api/mm/mmapi.F90" = ["C072"]
"src/dftbp/common/unitconversion.F90" = ["C072"]
"src/dftbp/dftbplus/input/fileaccess.F90" = ["C072"]
"src/dftbp/dftbplus/inputconversion.F90" = ["C072"]
"src/dftbp/io/charmanip.F90" = ["C072"]
"src/dftbp/type/linkedlists0.F90" = ["C072"]
# C131 missing-accessibility-statement (6 violations across 6 files)
"src/dftbp/api/mm/dftbplus.F90" = ["C131"]
"src/dftbp/dftb/extfields.F90" = ["C131"]
"src/dftbp/dftb/repulsive/repulsivelist.F90" = ["C131"]
"src/dftbp/math/bisect.F90" = ["C131"]
"src/dftbp/math/factorial.F90" = ["C131"]
"src/dftbp/math/hermite.F90" = ["C131"]
# C132 default-public-accessibility (5 violations across 5 files)
"src/dftbp/common/accuracy.F90" = ["C132"]
"src/dftbp/common/release.F90" = ["C132"]
"src/dftbp/dftb/dispersions.F90" = ["C132"]
"src/dftbp/dftbplus/outputfiles.F90" = ["C132"]
"src/dftbp/timedep/linrespcommon.F90" = ["C132"]
