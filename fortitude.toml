[check]
# Fypp include dirs — common.fypp provides sensible defaults for all
# WITH_* variables via defined(), so no -D flags are needed.
fypp-includes = ["src/dftbp/include"]

# Read CMake build configuration to automatically derive -D flags for fypp.
# Enabled boolean options (e.g. WITH_OMP:BOOL=ON) become -DWITH_OMP.
fypp-cmake-cache = "build"

# Metadata variables that don't have defaults in common.fypp.
# These are only used by #:assert and string literals, not code structure.
fypp-args = [
    "-DRELEASE='dev'",
    "-DAPIVERSION='0.0.0'",
    "-DAPIMAJOR=0",
    "-DAPIMINOR=0",
    "-DAPIPATCH=0",
    "-DELSI_VERSION=0",
]

# Exclude: test/ (needs fortuno external), external/ (third-party code),
# extlibs/ (thin wrappers around external libraries — minimal code, many stubs),
# utils/workarounds/ (intentionally non-standard compiler test programs),
# app/misc/cmake/ (CMake feature-detection programs),
# poisson/ (third-party code from Univ. Rome 'Tor Vergata')
extend-exclude = [
    "test/", "external/", "src/dftbp/extlibs/",
    "utils/workarounds/", "app/misc/cmake/",
    "src/dftbp/poisson/",
]

select = ["ALL"]
ignore = [
    # --- Internal test rules (not for real projects) ---
    "FORT",    # all Fortitude internal test rules (FORT99xx)

    # --- Formatting / style (not autofixable, too many) ---
    "S001",    # line-too-long — 1640 violations, manual reformatting needed

    # --- Coding conventions (too many violations to enforce yet) ---
    "C003",    # implicit-external-procedures — 290 violations, widespread in fypp macros
    "C002",    # interface-implicit-typing — 32 violations, tied to C003 patterns
    "C061",    # missing-intent — 388 violations, would need gradual enforcement

    # --- Scientific / domain idioms (false positives for scientific code) ---
    "C011",    # missing-default-case — 158 violations, many select cases by design
    "C021",    # no-real-suffix — 62 violations, scientific code uses bare literals
    "C031",    # magic-number-in-array-size — 32 violations, 3 = spatial dims etc.

    # --- Legacy interfaces (cannot be changed without API breaks) ---
    "C071",    # assumed-size-array — 28 violations, legacy interfaces
    "C072",    # assumed-size-character-intent — 9 violations, legacy C interop

    # --- Coding conventions (autofix available but would break: modules lack explicit `public ::`) ---
    "C131",    # missing-accessibility-statement — 6 violations
    "C132",    # default-public-accessibility — 5 violations
]
