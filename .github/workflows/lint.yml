name: Fortran Lint

on:
  push:
    paths:
      - 'app/**'
      - 'src/**'
      - 'fortitude.toml'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'
      - 'fortitude.toml'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    name: Fortitude
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # fortitude needs fypp for preprocessing .F90 files.
      # The CMake cache is also needed for conditional compilation flags.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install fypp fortitude-lint

      # Build a minimal CMake cache so fortitude can read WITH_* flags.
      # This doesn't compile anything — just runs CMake configure.
      - name: Generate CMake cache
        run: |
          cmake -B build \
            -DWITH_API=true \
            -DWITH_SDFTD3=true \
            -DWITH_TBLITE=true \
            -DWITH_MBD=true \
            -DWITH_TRANSPORT=true \
            || true  # Don't fail if compilers aren't found — we only need the cache

      - name: Run fortitude
        run: fortitude check --output-format github
